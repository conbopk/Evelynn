name: CI - Inference Service

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/services/inference/**"
      - ".github/workflows/ci-inference.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/services/inference/**"

defaults:
  run:
    working-directory: backend/services/inference

jobs:
  # ---------------------------------------------------------------------------
  # Lint + type-check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps
        run: pip install -r requirements/dev.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Mypy
        run: mypy app/

  # ---------------------------------------------------------------------------
  # Tests (CPU, no GPU required)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps (CPU-only torch skipped via mock)
        run: pip install -r requirements/dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: inference
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build Docker image (no push on PRs)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: backend/services/inference
          file: backend/services/inference/Dockerfile
          push: 'false'
          tags: evelynn-inference:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
