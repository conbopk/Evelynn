# Product override.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or run standalone (requires .env.prod)
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  inference:
    image: ghcr.io/conbopk/evelynn-inference:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      ENV: production
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      PRELOAD_MODEL: "true"
      HF_HUB_CACHE: /models
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  model-cache:
    driver: local
